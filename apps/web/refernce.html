<head>

<style>
:root{--ink:#3f4a3a;--parch:#faf5e8;--cloudCol:#ffffff;--cloudOp:.85}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',ui-rounded,system-ui,sans-serif;background:#0c1129;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
#scene{position:fixed;inset:0;overflow:hidden;touch-action:none;cursor:grab;opacity:0;transition:opacity 1.8s ease}
#scene.ready{opacity:1}
#scene.dragging{cursor:grabbing}
#skyA,#skyB{position:absolute;inset:0;transition:opacity 1.6s ease}
#starsC,#grassC,#partsC{position:absolute;inset:0;pointer-events:none}
#sun{position:absolute;width:74px;height:74px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#fff6d8,#ffd98a 55%,rgba(255,200,110,0) 78%);box-shadow:0 0 70px 28px rgba(255,214,130,.5);transition:left 1.6s ease,top 1.6s ease,opacity 1.6s ease;pointer-events:none}
#moon{position:absolute;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 40% 38%,#fbf7ea,#e6e0cc);box-shadow:0 0 46px 14px rgba(235,230,200,.28);transition:left 1.6s ease,top 1.6s ease,opacity 1.6s ease;pointer-events:none;overflow:hidden}
#moonShade{position:absolute;inset:0;border-radius:50%;background:#2c3760;opacity:.88;transition:transform .8s ease,background 1.6s ease}
.crater{position:absolute;border-radius:50%;background:rgba(150,140,112,.32)}
#cloudLayer{position:absolute;inset:0;pointer-events:none}
.cloud{position:absolute;opacity:var(--cloudOp);will-change:transform}
.cloud i{position:absolute;background:var(--cloudCol);border-radius:999px;transition:background 1.6s ease}
#hillsFar,#hillsNear{position:absolute;left:0;right:0;background-repeat:repeat-x;pointer-events:none}
#ground{position:absolute;left:0;right:0;bottom:0;pointer-events:none;transition:background 1.6s ease}
#world{position:absolute;inset:0;pointer-events:none;will-change:transform}
.flower{position:absolute;pointer-events:auto;cursor:pointer}
.flower svg{display:block;overflow:visible;transform-origin:50% 100%;animation:sway1 var(--dur,5s) ease-in-out var(--del,0s) infinite alternate}
.flower.deep svg{animation-name:sway2}
@keyframes sway1{from{transform:rotate(-1.3deg)}to{transform:rotate(1.5deg)}}
@keyframes sway2{from{transform:rotate(-2.3deg)}to{transform:rotate(2.1deg)}}
.monthLabel{position:absolute;font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#70634e;background:rgba(250,245,232,.82);padding:6px 12px;border-radius:999px;box-shadow:0 1px 5px rgba(60,50,30,.14);white-space:nowrap;backdrop-filter:blur(2px)}
#ambient{position:absolute;inset:0;pointer-events:none;transition:background 1.6s ease}
#vignette{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 42%,rgba(0,0,0,0) 58%,rgba(18,22,40,.17) 100%)}
header{position:fixed;top:calc(14px + env(safe-area-inset-top));left:20px;pointer-events:none;color:var(--ink);transition:color 1.6s ease;z-index:20}
header h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:27px;letter-spacing:.02em;line-height:1}
#loc{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.62;margin-top:5px}
#phaseBtn{position:fixed;top:calc(16px + env(safe-area-inset-top));right:16px;border:0;font:700 11px/1 'Nunito',sans-serif;letter-spacing:.1em;text-transform:uppercase;color:#5d5444;background:rgba(250,245,232,.85);padding:10px 14px;border-radius:999px;box-shadow:0 2px 8px rgba(40,36,20,.16);cursor:pointer;backdrop-filter:blur(3px);z-index:20}
#phaseBtn:focus-visible,.pill:focus-visible{outline:2px solid #7e9a6d;outline-offset:2px}
#scrubber{position:fixed;left:0;right:0;bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:safe center;overflow-x:auto;padding:6px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;z-index:20}
#scrubber::-webkit-scrollbar{display:none}
.pill{flex:0 0 auto;border:0;font:700 11px/1 'Nunito',sans-serif;letter-spacing:.06em;color:#6a5f4c;background:rgba(250,245,232,.78);padding:10px 14px;border-radius:999px;cursor:pointer;box-shadow:0 1px 5px rgba(40,36,20,.13);transition:background .3s,color .3s}
.pill.active{background:#7e9a6d;color:#fbf8ee}
#hint{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(64px + env(safe-area-inset-bottom));font-size:12px;font-weight:600;letter-spacing:.08em;color:var(--ink);opacity:.55;pointer-events:none;transition:opacity .8s ease,color 1.6s ease;z-index:20;white-space:nowrap}
#hint.gone{opacity:0}
#popup{position:fixed;left:50%;transform:translateX(-50%) translateY(10px);bottom:calc(64px + env(safe-area-inset-bottom));width:min(340px,calc(100vw - 32px));background:var(--parch);border-radius:18px;padding:18px 20px 16px;box-shadow:0 10px 36px rgba(30,26,14,.28);opacity:0;pointer-events:none;transition:opacity .35s ease,transform .35s ease;z-index:30}
#popup.open{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
#popClose{position:absolute;top:8px;right:12px;border:0;background:none;font-size:20px;color:#9a8d74;cursor:pointer;line-height:1;padding:4px}
#popDate{font-size:10.5px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#9a8d74}
#popup h2{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:22px;color:#473e2e;margin:4px 0 6px}
#popMeta{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#7a6e58;margin-bottom:8px}
#popChip{width:10px;height:10px;border-radius:50%;display:inline-block;flex:0 0 auto}
#popFav{margin-left:auto;color:#d9a93f;font-size:14px}
#popText{font-size:13.5px;line-height:1.55;color:#5d5444}
@media (prefers-reduced-motion:reduce){.flower svg{animation:none!important}}
</style>
</head>

function moonPhaseFrac(d){const syn=29.530588853;const ref=Date.UTC(2000,0,6,18,14);return((((d.getTime()-ref)/86400000)%syn)+syn)%syn/syn}

/* ---------- procedural flower heads ---------- */
function headDaisy(r,cx,cy){let s='';const n=10+Math.floor(r()*4);
 for(let i=0;i<n;i++){const a=360/n*i+(r()-.5)*8;const ry=15+r()*4;
  s+='<ellipse cx="0" cy="'+(-8-ry/2).toFixed(1)+'" rx="4.6" ry="'+ry.toFixed(1)+'" fill="#fbf6ea" stroke="#eadfc5" stroke-width=".6" transform="translate('+cx.toFixed(1)+','+cy+') rotate('+a.toFixed(1)+')"/>';}
 s+='<circle cx="'+cx.toFixed(1)+'" cy="'+cy+'" r="7.6" fill="#f0b13e"/><circle cx="'+(cx-2).toFixed(1)+'" cy="'+(cy-2)+'" r="2.4" fill="#f8cd72"/>';return s}
function headLavender(r,cx,cy){let s='';const n=9+Math.floor(r()*4);
 for(let i=0;i<n;i++){const t=i/n;const y=cy+30-t*34;const side=i%2?1:-1;const x=cx+side*(3+r()*2)*(1-t*.4);const c=i%2?'#9d87cf':'#8a73c2';
  s+='<ellipse cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" rx="3.4" ry="5" fill="'+c+'" transform="rotate('+(side*22)+' '+x.toFixed(1)+' '+y.toFixed(1)+')"/>';}
 s+='<ellipse cx="'+cx.toFixed(1)+'" cy="'+(cy-7)+'" rx="3" ry="5.4" fill="#b09fdd"/>';return s}
function headRose(r,cx,cy){let s='';
 const ring=(n,dist,rx,ry,col)=>{for(let i=0;i<n;i++){const a=360/n*i+r()*14;
  s+='<ellipse cx="0" cy="'+(-dist)+'" rx="'+rx+'" ry="'+ry+'" fill="'+col+'" transform="translate('+cx.toFixed(1)+','+cy+') rotate('+a.toFixed(1)+')"/>';}};
 ring(8,9,7.5,10,'#ef9bb0');ring(6,5.5,6,8,'#e27894');ring(5,3,4.5,6,'#cf5b7e');
 s+='<circle cx="'+cx.toFixed(1)+'" cy="'+cy+'" r="4.6" fill="#b8456b"/><path d="M '+(cx-3).toFixed(1)+','+cy+' a3,3 0 1 1 5,2" stroke="#e89bb1" stroke-width="1.1" fill="none"/>';return s}
function headBluebell(r,cx,cy){let s='';const dir=r()<.5?1:-1;
 s+='<path d="M '+cx.toFixed(1)+','+cy+' q '+(14*dir)+',-10 '+(26*dir)+',-2" fill="none" stroke="#5d7a4a" stroke-width="2.4" stroke-linecap="round"/>';
 const pts=[[cx+6*dir,cy-4],[cx+16*dir,cy-7],[cx+25*dir,cy-3]];
 for(const p of pts){const px=p[0],py=p[1];const drop=5+r()*4;const bx=px,by=py+drop;const col=r()<.5?'#7d8ed3':'#6b7ac6';
  s+='<line x1="'+px.toFixed(1)+'" y1="'+py.toFixed(1)+'" x2="'+bx.toFixed(1)+'" y2="'+by.toFixed(1)+'" stroke="#5d7a4a" stroke-width="1.4"/>';
  s+='<path d="M '+(bx-5.5).toFixed(1)+','+by.toFixed(1)+' C '+(bx-6.5).toFixed(1)+','+(by+9).toFixed(1)+' '+(bx-4).toFixed(1)+','+(by+13).toFixed(1)+' '+bx.toFixed(1)+','+(by+14).toFixed(1)+' C '+(bx+4).toFixed(1)+','+(by+13).toFixed(1)+' '+(bx+6.5).toFixed(1)+','+(by+9).toFixed(1)+' '+(bx+5.5).toFixed(1)+','+by.toFixed(1)+' Q '+bx.toFixed(1)+','+(by-4).toFixed(1)+' '+(bx-5.5).toFixed(1)+','+by.toFixed(1)+' Z" fill="'+col+'"/>';
  s+='<path d="M '+(bx-4).toFixed(1)+','+(by+12.5).toFixed(1)+' q 4,3 8,0" stroke="#5a68b3" stroke-width="1" fill="none"/>';}
 return s}
function headDahlia(r,cx,cy){let s='';
 const ring=(n,len,w,col)=>{for(let i=0;i<n;i++){const a=360/n*i+r()*8;

 ring(12,26,5,'#df6e3b');ring(9,17,4.4,'#f09a52');

/* ---------- deterministic flower build (entry -> svg) ---------- */
function buildFlowerSVG(e){
 const seed=hashStr(e.id),r=mulberry32(seed);
 let sp=SPECIES[e.mood]||'lavender';
 if(sp==='daisy'&&(/!!!/.test(e.text)||seed%10===0))sp='pumpkin';
 if(sp==='pumpkin')return{sp:sp,svg:pumpkinSVG(r),h:62,w:96};
 const h=Math.round(88+clamp(e.words,20,260)/260*62);
 const w=Math.round(h*0.62);
 const lean=(r()-.5)*26;
 const hx=60+lean;
 const hy=sp==='lavender'?62:(sp==='bluebell'?78:58);
 const stemTop=sp==='lavender'?hy+30:(sp==='bluebell'?hy:hy+8);
 const shadow='<ellipse cx="60" cy="196" rx="13" ry="3.2" fill="rgba(35,55,28,.16)"/>';
 const stem='<path d="M60,196 C 60,160 '+(60+lean*0.35).toFixed(1)+',124 '+hx.toFixed(1)+','+stemTop+'" fill="none" stroke="#5f8049" stroke-width="3.4" stroke-linecap="round"/>';
 let leaves='';const nl=1+Math.min((e.tags||[]).length,2);
 for(let i=0;i<nl;i++){const t=0.28+i*0.17+r()*0.06;const side=i%2?1:-1;
  const lx=60+lean*t*t,ly=196-(196-stemTop)*t;const ang=side*(38+r()*14);
  leaves+='<ellipse cx="'+(lx+side*9).toFixed(1)+'" cy="'+ly.toFixed(1)+'" rx="11" ry="4" fill="#6f9456" transform="rotate('+(-ang).toFixed(0)+' '+lx.toFixed(1)+' '+ly.toFixed(1)+')"/>';}
 const gid='g'+seed;
 const defs=e.fav?'<defs><radialGradient id="'+gid+'"><stop offset="0%" stop-color="rgba(255,222,140,.55)"/><stop offset="100%" stop-color="rgba(255,222,140,0)"/></radialGradient></defs>':'';
 const halo=e.fav?'<circle cx="'+hx.toFixed(1)+'" cy="'+hy+'" r="27" fill="url(#'+gid+')"/>':'';
 const head=HEADS[sp](r,hx,hy);
 const svg='<svg viewBox="0 0 120 200" width="'+w+'" height="'+h+'" style="--dur:'+(4.6+r()*2.6).toFixed(2)+'s;--del:'+(-(r()*6)).toFixed(2)+'s">'+defs+halo+shadow+stem+leaves+head+'</svg>';
 return{sp:sp,svg:svg,h:h,w:w};
}

function hillTileURL(color,seedN,h,amp){

 const p1=r()*6.283,p2=r()*6.283,a1=amp,a2=amp*0.45;
 function yAt(x){return h*0.45-a1*Math.sin(x/wT*6.283185+p1)-a2*Math.sin(x/wT*12.56637+p2)}
 let d='M0,'+h+' L0,'+yAt(0).toFixed(1);
 for(let x=30;x<=wT;x+=30)d+=' L'+x+','+yAt(x).toFixed(1);
 d+=' L'+wT+','+h+' Z';
 const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+wT+'" height="'+h+'"><path d="'+d+'" fill="'+color+'"/></svg>';
 return 'url("data:image/svg+xml,'+encodeURIComponent(svg)+'")';
}

/* ---------- input: pan, momentum, taps ---------- */
let lastX=0,lastMoveT=0,moved=0,tapTarget=null,hintShown=true;
scene.addEventListener('pointerdown',function(e){

});
scene.addEventListener('pointermove',function(e){
 if(!dragging)return;
 const now=performance.now();
 const dx=e.clientX-lastX;
 const dt=Math.max(8,now-lastMoveT);

 vel=lerp(vel,-dx/(dt/1000),0.4);

 if(hintShown&&moved>40){hintShown=false;$('#hint').classList.add('gone');}
});
function endDrag(e){

  const f=tapTarget&&tapTarget.closest?tapTarget.closest('.flower'):null;

 const d=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;
 scroll=clamp(scroll+d,0,maxScroll);
 if(hintShown){hintShown=false;$('#hint').classList.add('gone');}
},{passive:true});
function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}

/* ---------- render loops ---------- */
function drawStars(now,dt){
 sctx.clearRect(0,0,vw,vh);
 if(starAlpha>0.02){
  sctx.fillStyle='#f5f2e2';
  for(const s of stars){
   const tw=0.55+0.45*Math.sin(now*0.001*s.tw+s.ph);
   sctx.globalAlpha=starAlpha*tw;
   sctx.beginPath();sctx.arc(s.fx*vw,s.fy*groundY,s.r,0,6.283);sctx.fill();
  }
  sctx.globalAlpha=1;
 }
 if(shoot){
  shoot.t+=dt;
  shoot.x+=shoot.vx*dt;shoot.y+=shoot.vy*dt;
  const k=1-shoot.t/shoot.life;
  if(k<=0){shoot=null;}
  else{
   sctx.strokeStyle='rgba(250,246,225,'+(0.85*k*starAlpha).toFixed(2)+')';
   sctx.lineWidth=1.6;sctx.lineCap='round';
   sctx.beginPath();sctx.moveTo(shoot.x,shoot.y);
   sctx.lineTo(shoot.x-shoot.vx*0.10,shoot.y-shoot.vy*0.10);sctx.stroke();
  }
 }else if(!RM){
  shootTimer-=dt;
  if(shootTimer<=0&&starAlpha>0.5){
   shoot={x:vw*(0.15+Math.random()*0.6),y:groundY*(0.06+Math.random()*0.3),vx:620,vy:210,t:0,life:0.7};
   shootTimer=8+Math.random()*16;
  }
 }
}
function drawGrass(now){
 gctx.clearRect(0,0,vw,vh);
 gctx.lineWidth=1.7;gctx.lineCap='round';
 const t=now*0.001;
 for(let sx=-8;sx<vw+8;sx+=6){
  const wxi=Math.floor((sx+scroll)/6);
  const a=n1(wxi),b=n1(wxi*7+13),c=n1(wxi*3+5);
  const rooty=groundY+8+b*58;
  const hgt=12+a*20+(rooty-groundY)*0.12;
  const amp=RM?0:(1.6+c*2.6);
  const sw=Math.sin(t*(0.9+a*0.7)+wxi*0.7)*amp;
  const sh=0.78+c*0.34;
  gctx.strokeStyle='rgba('+Math.round(grassCur[0]*sh)+','+Math.round(grassCur[1]*sh)+','+Math.round(grassCur[2]*sh)+',0.95)';
  gctx.beginPath();
  gctx.moveTo(sx,rooty);
  gctx.quadraticCurveTo(sx+sw*0.35,rooty-hgt*0.6,sx+sw,rooty-hgt);
  gctx.stroke();
 }
}
function initParticles(){
 fireflies=[];pollen=[];petals=[];
 for(let i=0;i<16;i++)fireflies.push({x:Math.random()*vw,y:groundY-20+Math.random()*60,a:Math.random()*6.283,s:12+Math.random()*16,ph:Math.random()*6.283,pul:0.7+Math.random()*0.9});
 for(let i=0;i<22;i++)pollen.push({x:Math.random()*vw,y:groundY-Math.random()*180,s:6+Math.random()*10,ph:Math.random()*6.283});
}
function drawParticles(now,dt){
 pctx.clearRect(0,0,vw,vh);
 if(RM)return;
 if(starAlpha>0.25){
  pctx.save();pctx.shadowColor='#ffe9a0';pctx.shadowBlur=9;pctx.fillStyle='#ffeaa0';
  for(const f of fireflies){
   f.a+=Math.sin(now*0.0007+f.ph)*0.9*dt;
   f.x+=Math.cos(f.a)*f.s*dt;f.y+=Math.sin(f.a)*f.s*dt*0.5;
   if(f.x<-10)f.x=vw+10;if(f.x>vw+10)f.x=-10;
   if(f.y<groundY-110)f.y=groundY-110;if(f.y>groundY+58)f.y=groundY+58;
   const al=starAlpha*(0.25+0.75*Math.max(0,Math.sin(now*0.002*f.pul+f.ph)));
   pctx.globalAlpha=al;
   pctx.beginPath();pctx.arc(f.x,f.y,1.8,0,6.283);pctx.fill();
  }
  pctx.restore();pctx.globalAlpha=1;
 }
 if(sunAmt>0.15){
  pctx.fillStyle='#fff4c8';
  for(const p of pollen){
   p.x-=p.s*dt;p.y-=p.s*0.35*dt;
   const wob=Math.sin(now*0.0012+p.ph)*8;
   if(p.x<-10){p.x=vw+10;p.y=groundY-Math.random()*180;}
   if(p.y<groundY-220)p.y=groundY+10;
   pctx.globalAlpha=sunAmt*(0.18+0.22*Math.abs(Math.sin(now*0.0016+p.ph)));
   pctx.beginPath();pctx.arc(p.x+wob,p.y,1.4,0,6.283);pctx.fill();
  }
  pctx.globalAlpha=1;
 }
 if((season==='spring'||season==='summer')&&sunAmt>0.4&&Math.random()<dt*0.55&&petals.length<10){
  petals.push({x:-16,y:40+Math.random()*(groundY*0.7),vx:46+Math.random()*36,ph:Math.random()*6.283,rot:Math.random()*6.283});
 }
 for(let i=petals.length-1;i>=0;i--){
  const p=petals[i];
  p.x+=p.vx*dt;p.y+=Math.sin(now*0.0016+p.ph)*14*dt+6*dt;p.rot+=dt*1.6;
  if(p.x>vw+24){petals.splice(i,1);continue;}
  pctx.save();pctx.translate(p.x,p.y);pctx.rotate(p.rot);
  pctx.fillStyle='rgba(244,196,208,'+(0.7*sunAmt).toFixed(2)+')';
  pctx.beginPath();pctx.ellipse(0,0,4.4,2.6,0,0,6.283);pctx.fill();
  pctx.restore();
 }
}
let lastTime=performance.now();
function tick(now){
 const dt=Math.min(0.05,(now-lastTime)/1000);lastTime=now;
 if(!dragging){
  if(jump){
   jump.t+=dt;
   const k=easeInOutCubic(Math.min(1,jump.t/jump.dur));
   scroll=lerp(jump.from,jump.to,k);
   if(jump.t>=jump.dur)jump=null;
  }else if(Math.abs(vel)>6){
   scroll=clamp(scroll+vel*dt,0,maxScroll);
   vel*=Math.exp(-3.0*dt);
   if(scroll<=0||scroll>=maxScroll)vel=0;
  }
 }
 world.style.transform='translate3d('+(-scroll).toFixed(1)+'px,0,0)';
 $('#hillsFar').style.backgroundPositionX=(-scroll*0.22).toFixed(1)+'px';
 $('#hillsNear').style.backgroundPositionX=(-scroll*0.45).toFixed(1)+'px';
 for(const c of clouds){
  if(!RM)c.x+=c.sp*dt;
  const span=vw+c.w*2;
  let wx=(c.x-scroll*0.08)%span;if(wx<0)wx+=span;
  c.el.style.transform='translate3d('+(wx-c.w).toFixed(1)+'px,'+c.y.toFixed(1)+'px,0)';
 }
 starAlpha+=(starTarget-starAlpha)*Math.min(1,dt*2.2);
 sunAmt+=(sunTarget-sunAmt)*Math.min(1,dt*2.2);
 for(let i=0;i<3;i++)grassCur[i]+=(grassTarget[i]-grassCur[i])*Math.min(1,dt*2.2);
 drawStars(now,dt);
 drawGrass(now);
 drawParticles(now,dt);
 updateActivePill();
 requestAnimationFrame(tick);
}

/* ---------- init & resize ---------- */
function rebuild(){
 sizeCanvases();layoutStatic();groupMonths();buildWorld();buildScrubber();makeClouds();initParticles();
 maxScroll=Math.max(0,worldWidth-vw);
 scroll=clamp(scroll,0,maxScroll);
 applyPhase(currentPhaseName,true);
}
let resizeT=null;
window.addEventListener('resize',function(){
 clearTimeout(resizeT);
 resizeT=setTimeout(function(){rebuild();},160);
});
function init(){
 sizeCanvases();layoutStatic();groupMonths();buildWorld();buildScrubber();makeClouds();buildStars();initParticles();
 maxScroll=Math.max(0,worldWidth-vw);
 scroll=maxScroll;
 const name=phaseForHour(new Date().getHours());
 currentPhaseName=name;
 applyPhase(name,true);
 $('#loc').textContent='Goa, India · '+monthLabel(months[months.length-1].key,{month:'long'});
 scene.classList.add('ready');
 requestAnimationFrame(tick);
}
init();
</script>
